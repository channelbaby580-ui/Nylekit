<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nylekit</title>
<meta name="description" content="Ubah satu kalimat jadi quote yang nampar.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg:#E4DDCB; --paper:#FCFAF3; --ink:#211E18; --accent:#C4452D;
          --mono:'Space Mono', ui-monospace, 'Courier New', monospace;
          --disp:'Anton', Impact, 'Arial Narrow Bold', sans-serif; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 20% 10%, #efe9da, transparent 60%),
      repeating-linear-gradient(45deg, #00000003 0 2px, transparent 2px 6px),
      var(--bg);
    color: var(--ink); font-family: var(--mono);
    display: flex; flex-direction: column; align-items: center; padding: 36px 20px 56px;
  }
  .wrap { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 20px; }
  .topbar { display: flex; justify-content: flex-end; }
  .lang { display: flex; border: 1.5px solid var(--ink); border-radius: 999px; overflow: hidden; }
  .lang button { cursor: pointer; border: none; background: transparent; color: var(--ink); font-family: var(--mono); font-size: 12px; padding: 6px 12px; }
  .lang button.on { background: var(--ink); color: var(--paper); }
  .wordmark { font-family: var(--disp); font-size: 64px; letter-spacing: .02em; text-transform: uppercase; line-height: .9; }
  .wordmark::after { content: " ®"; font-size: 18px; vertical-align: super; color: var(--accent); }
  .tagline { font-size: 12px; letter-spacing: .16em; text-transform: uppercase; margin-top: 6px; opacity: .85; }
  .hero { font-size: 14px; line-height: 1.5; border-left: 3px solid var(--accent); padding-left: 12px; }
  label { display: block; margin-bottom: 8px; font-size: 14px; }
  textarea {
    width: 100%; min-height: 90px; resize: none; padding: 14px 16px; font-size: 16px; line-height: 1.4;
    background: var(--paper); border: 1.5px dashed #211E1855; border-radius: 2px; color: var(--ink);
    font-family: var(--mono); outline: none; transition: border-color .2s;
  }
  textarea:focus { border-color: var(--accent); border-style: solid; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    cursor: pointer; padding: 9px 15px; font-size: 14px; border-radius: 999px;
    background: var(--paper); border: 2px solid #211E1830; transition: all .18s; user-select: none;
  }
  .chip.sel { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .tag-chip { font-size: 13px; padding: 7px 13px; }
  .tag-chip.sel { background: var(--accent); border-color: var(--accent); color: #fff; }
  .go {
    cursor: pointer; width: 100%; padding: 15px; font-size: 17px; border: none;
    background: var(--ink); color: var(--paper); border-radius: 2px;
    font-family: var(--disp); letter-spacing: .06em; text-transform: uppercase; transition: background .2s, transform .1s;
  }
  .go:hover:not(:disabled) { background: var(--accent); }
  .go:active { transform: scale(.985); }
  .go:disabled { opacity: .55; cursor: wait; }
  .out { min-height: 4px; }
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
  .actions .full { grid-column: 1 / -1; }
  .btn { cursor: pointer; padding: 12px 14px; font-size: 13px; border-radius: 4px; font-family: var(--mono); transition: all .15s; border: 1.5px solid var(--ink); }
  .btn.ghost { background: var(--paper); color: var(--ink); }
  .btn.ghost:hover { background: var(--ink); color: var(--paper); }
  .btn.solid { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
  .btn.solid:hover { filter: brightness(1.08); }
  .footer { text-align: center; font-size: 11px; opacity: .5; line-height: 1.6; margin-top: 4px; }
  .receipt {
    background: var(--paper); color: var(--ink); padding: 22px 20px 26px; position: relative;
    box-shadow: 0 14px 30px -16px #00000055; --tooth: 9px;
    -webkit-mask: radial-gradient(var(--tooth) at 50% 0, #0000 98%, #000) 50% 0/18px 100% repeat-x,
                  radial-gradient(var(--tooth) at 50% 100%, #0000 98%, #000) 50% 100%/18px 100% repeat-x,
                  linear-gradient(#000 0 0) 50%/calc(100% - 18px) calc(100% - 36px) no-repeat;
    mask: radial-gradient(var(--tooth) at 50% 0, #0000 98%, #000) 50% 0/18px 100% repeat-x,
          radial-gradient(var(--tooth) at 50% 100%, #0000 98%, #000) 50% 100%/18px 100% repeat-x,
          linear-gradient(#000 0 0) 50%/calc(100% - 18px) calc(100% - 36px) no-repeat;
  }
  .receipt h4 { text-align: center; font-size: 15px; letter-spacing: .15em; border-bottom: 2px dashed #2222; padding-bottom: 10px; margin-bottom: 14px; }
  .receipt .meta { font-size: 11px; opacity: .6; display: flex; justify-content: space-between; margin-bottom: 14px; }
  .receipt .quote { font-size: 18px; line-height: 1.55; margin: 4px 0 16px; white-space: pre-line; }
  .receipt .line { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; }
  .receipt .total { border-top: 2px dashed #2222; margin-top: 10px; padding-top: 10px; font-weight: 700; color: var(--accent); }
  .receipt .barcode { height: 42px; margin: 16px 0 8px; background: repeating-linear-gradient(90deg, var(--ink) 0 2px, transparent 2px 3px, var(--ink) 3px 4px, transparent 4px 7px); }
  .receipt .thanks { text-align: center; font-size: 11px; letter-spacing: .12em; opacity: .8; }
  .receipt.err .quote { color: var(--accent); }
  .pop-in { animation: popin .4s cubic-bezier(.18,.9,.32,1.4); }
  @keyframes popin { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform:none; } }
  .blink { animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: .25; } }
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important} }
  @media (max-width:380px){ .wordmark{font-size:52px} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="lang">
        <button id="langId" class="on">ID</button>
        <button id="langEn">EN</button>
      </div>
    </div>
    <div>
      <div class="wordmark">Nylekit</div>
      <div class="tagline" id="t-tagline"></div>
    </div>
    <p class="hero" id="t-hero"></p>
    <div>
      <label id="t-inputLabel"></label>
      <textarea id="feeling"></textarea>
    </div>
    <div>
      <label id="t-toneLabel"></label>
      <div class="chips" id="tones"></div>
    </div>
    <button class="go" id="go"></button>
    <div class="out" id="out"></div>
    <div>
      <label id="t-tagLabel" style="font-size:13px"></label>
      <div class="chips" id="tags"></div>
    </div>
    <p class="footer" id="t-footer"></p>
  </div>

<script>
  // ============================================================
  const WEBHOOK_URL = "https://n8n.abyzenstudio.com/webhook-test/nylekit";
  // ============================================================

  const TONES = ["Nylekit","Lucu","Bijak","Absurd","Ikhlas","Filsuf","Indie"];

  const I18N = {
    id: {
      tagline: "Tulis jujur, biar Nylekit yang nyari katanya",
      hero: "Ubah satu kalimat uneg-uneg jadi quote yang nampar — siap buat caption, story, atau sekadar validasi diri sendiri.",
      inputLabel: "Lagi ngerasa apa? Satu kalimat aja.",
      placeholder: "cth: becandaan kamu bikin aku kangen",
      toneLabel: "Mau nada yang gimana?",
      toneNames: { Nylekit:"😏 Nylekit", Lucu:"😆 Lucu", Bijak:"🧘 Bijak", Absurd:"🌀 Absurd", Ikhlas:"😌 Ikhlas", Filsuf:"🦉 Filsuf", Indie:"🌇 Indie" },
      go: "Cetak struk curhat", going: "Mencetak...",
      tagLabel: "Hashtag (pilih satu, bisa diganti-ganti):",
      copy: "Copy teks", copied: "Tersalin ✓", copyTag: "Copy + hashtag", again: "Cetak lagi",
      footer: "Bikin satu, posting di mana aja.",
      rTitle: "★ STRUK CURHAT ★", rTone: "Nada", rHonest: "Kejujuran", rTotal: "TOTAL SAKIT", rThanks: "TERIMA KASIH SUDAH NYELEKIT",
      loadTitle: "★ MENCETAK ★", loading: "Lagi mikirin kalimatmu...",
      errTitle: "✖ STRUK GAGAL TERCETAK ✖", errBody: "Lagi ada gangguan. Coba lagi sebentar ya.", errHint: "Tarik napas, coba sekali lagi",
      errEmpty: "Isi dulu satu kalimat perasaanmu di atas.",
      tags: ["katakata","quotesindonesia","galau","sajak","relatable"]
    },
    en: {
      tagline: "Spill it honestly, let Nylekit find the words",
      hero: "Turn one honest line into a quote that hits — ready for a caption, a story, or just to validate yourself.",
      inputLabel: "How are you feeling? Just one line.",
      placeholder: "e.g. your jokes make me miss you",
      toneLabel: "Pick a tone",
      toneNames: { Nylekit:"😏 Savage", Lucu:"😆 Funny", Bijak:"🧘 Wise", Absurd:"🌀 Absurd", Ikhlas:"😌 Let Go", Filsuf:"🦉 Sage", Indie:"🌇 Indie" },
      go: "Print my receipt", going: "Printing...",
      tagLabel: "Hashtag (pick one, swap to test):",
      copy: "Copy text", copied: "Copied ✓", copyTag: "Copy + hashtag", again: "Print again",
      footer: "Make one, post it anywhere.",
      rTitle: "★ FEELINGS RECEIPT ★", rTone: "Tone", rHonest: "Honesty", rTotal: "TOTAL PAIN", rThanks: "THANKS FOR THE STING",
      loadTitle: "★ PRINTING ★", loading: "Chewing on your words...",
      errTitle: "✖ RECEIPT FAILED ✖", errBody: "Something hiccuped. Give it another go.", errHint: "Take a breath, try once more",
      errEmpty: "Type one honest line above first.",
      tags: ["quotes","relatable","deepthoughts","poetry","feelings"]
    }
  };
  const TOTALS = {
    id: { Nylekit:"Rp ∞", Lucu:"Rp 0 (gratis sakitnya)", Bijak:"Sepadan", Absurd:"404 not found", Ikhlas:"Lunas, ikhlas", Filsuf:"Tak ternilai", Indie:"Bayar pakai sepi" },
    en: { Nylekit:"∞", Lucu:"$0 (free pain)", Bijak:"Worth it", Absurd:"404 not found", Ikhlas:"Settled", Filsuf:"Priceless", Indie:"Paid in silence" }
  };

  let lang = "id";
  let tone = "Nylekit";
  let activeTag = I18N.id.tags[0];

  const $ = id => document.getElementById(id);
  const out = $("out"), goBtn = $("go"), feelingEl = $("feeling");

  function getUserId(){
    try {
      let id = localStorage.getItem("nylekit_uid");
      if(!id){ id = "u_" + Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); localStorage.setItem("nylekit_uid", id); }
      return id;
    } catch(e){
      window.__uid = window.__uid || ("u_" + Math.random().toString(36).slice(2,10));
      return window.__uid;
    }
  }
  const USER_ID = getUserId();

  function getSource(){
    try {
      const p = new URLSearchParams(location.search).get("src");
      if(p) return p.toLowerCase().slice(0,40);
    } catch(e){}
    try {
      const r = document.referrer;
      if(r){
        const h = new URL(r).hostname.replace(/^www\./,"");
        if(h.includes("linkedin")) return "linkedin";
        if(h.includes("threads")) return "threads";
        if(h.includes("instagram")) return "instagram";
        if(h.includes("facebook")) return "facebook";
        if(h.includes("tiktok")) return "tiktok";
        if(h.includes("t.co") || h.includes("twitter") || h === "x.com") return "twitter/x";
        return h;
      }
    } catch(e){}
    return "langsung";
  }
  const SOURCE = getSource();

  function T(){ return I18N[lang]; }

  function renderTones(){
    $("tones").innerHTML = TONES.map(k =>
      `<div class="chip ${k===tone?'sel':''}" data-tone="${k}">${T().toneNames[k]}</div>`).join("");
  }
  function renderTags(){
    const list = T().tags;
    if(!list.includes(activeTag)) activeTag = list[0];
    $("tags").innerHTML = list.map(tg =>
      `<div class="chip tag-chip ${tg===activeTag?'sel':''}" data-tag="${tg}">#${tg}</div>`).join("");
  }
  function applyLang(){
    $("t-tagline").textContent = T().tagline;
    $("t-hero").textContent = T().hero;
    $("t-inputLabel").textContent = T().inputLabel;
    feelingEl.placeholder = T().placeholder;
    $("t-toneLabel").textContent = T().toneLabel;
    $("t-tagLabel").textContent = T().tagLabel;
    $("t-footer").textContent = T().footer;
    goBtn.textContent = T().go;
    renderTones(); renderTags();
  }

  $("langId").onclick = () => { lang="id"; $("langId").classList.add("on"); $("langEn").classList.remove("on"); applyLang(); };
  $("langEn").onclick = () => { lang="en"; $("langEn").classList.add("on"); $("langId").classList.remove("on"); applyLang(); };
  $("tones").addEventListener("click", e => { const t=e.target.closest(".chip"); if(!t) return; tone=t.dataset.tone; renderTones(); });
  $("tags").addEventListener("click", e => { const t=e.target.closest(".chip"); if(!t) return; activeTag=t.dataset.tag; renderTags(); });

  const stamp = () => { const d=new Date(); const loc = lang==="id"?"id-ID":"en-GB";
    return d.toLocaleDateString(loc,{day:"2-digit",month:"short",year:"numeric"}) + " · " +
           d.toLocaleTimeString(loc,{hour:"2-digit",minute:"2-digit"}); };
  const rid = () => "NYL-" + Math.floor(Math.random()*900000+100000);

  function showLoading(){
    out.innerHTML = `<div class="receipt pop-in"><h4>${T().loadTitle}</h4>
      <div class="meta"><span>${stamp()}</span><span>${rid()}</span></div>
      <div class="quote blink">${T().loading}</div><div class="barcode"></div></div>`;
  }

  function escapeHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function showReceipt(quote){
    out.innerHTML = `
      <div class="receipt pop-in">
        <h4>${T().rTitle}</h4>
        <div class="meta"><span>${stamp()}</span><span>${rid()}</span></div>
        <div class="line"><span>${T().rTone}</span><span>${T().toneNames[tone].replace(/^[^ ]+ /,'')}</span></div>
        <div class="quote">"${escapeHtml(quote)}"</div>
        <div class="line"><span>${T().rHonest}</span><span>1 pcs</span></div>
        <div class="line total"><span>${T().rTotal}</span><span>${TOTALS[lang][tone]}</span></div>
        <div class="barcode"></div>
        <div class="thanks">${T().rThanks}</div>
      </div>
      <div class="actions">
        <button class="btn ghost" id="copyBtn">${T().copy}</button>
        <button class="btn solid" id="copyTagBtn">${T().copyTag}</button>
        <button class="btn ghost full" id="againBtn">${T().again}</button>
      </div>`;
    $("copyBtn").onclick = (ev) => copy(quote, ev.target);
    $("copyTagBtn").onclick = (ev) => copy(quote + "\n\n#" + activeTag, ev.target);
    $("againBtn").onclick = generate;
  }

  function copy(text, el){
    const old = el.textContent;
    try { navigator.clipboard.writeText(text); } catch(e){ console.error(e); }
    el.textContent = T().copied;
    setTimeout(()=> el.textContent = old, 1400);
  }

  function showError(){
    out.innerHTML = `<div class="receipt err pop-in"><h4>${T().errTitle}</h4>
      <div class="meta"><span>${stamp()}</span><span>${rid()}</span></div>
      <div class="quote">${T().errBody}</div><div class="thanks">${T().errHint}</div></div>`;
  }

  async function generate(){
    const feeling = feelingEl.value.trim();
    if(!feeling){ feelingEl.focus(); out.innerHTML =
      `<div class="receipt err pop-in"><h4>${T().errTitle}</h4><div class="quote">${T().errEmpty}</div></div>`; return; }
    if(!WEBHOOK_URL){ console.warn("[Nylekit] WEBHOOK_URL kosong."); showError(); return; }

    goBtn.disabled = true; goBtn.textContent = T().going; showLoading();
    try {
      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ feeling, tone, lang, userId: USER_ID, source: SOURCE })
      });
      if(!res.ok) throw new Error("HTTP " + res.status);
      const quote = (await res.text()).trim();
      if(!quote) throw new Error("Empty response");
      showReceipt(quote);
    } catch(err){
      console.error("[Nylekit]", err);
      showError();
    } finally {
      goBtn.disabled = false; goBtn.textContent = T().go;
    }
  }

  goBtn.addEventListener("click", generate);
  applyLang();
</script>
</body>
</html>
